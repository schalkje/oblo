definition_of_done: "Opens with a short, generic 'glue code we've all written' imperative-pipeline hook (shared pain, not the author's own project), no naming history; explains the declarative model (declare tables in SQL, engine derives DAG, order, incremental state); covers streaming table vs. materialized view vs. plain view with SQL examples and when to use what; shows table properties/descriptions, data-quality expectations (warn/drop/fail), and backloading; covers pipeline code organization (multiple files vs together, recommended transformations/ layout, dependencies resolved by name across files); gives an honest problems/disadvantages 'when NOT to use this' read (serverless-only MV incremental refresh, streaming-table lock-down, full-refresh data-loss risk, one-pipeline-owns-the-table); notes relevant preview/coming features in a short dated box; grounded in one finance PoC (clients/payments/investments-or-loans, 2-3 steps, SQL split one file per medallion layer) the author runs on Databricks that generates its own data AND updates so incremental changes are demoed, with real SQL and a DAG screenshot; names at least one gotcha/'big bad'; open-source SDP only as a footnote where it differs; scannable wrestling-post register with a pragmatic close or open question."
